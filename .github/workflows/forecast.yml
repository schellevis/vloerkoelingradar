# .github/workflows/forecast.yml
name: forecast
on:
  schedule:
    - cron: "0 */6 * * *"   # elke 6 uur
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
  id-token: write
  models: read   # GitHub Models: landelijke dauwpunt-indruk in de data-job
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volledige historie nodig voor rebase vóór push
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch forecast
        run: python -m scripts.fetch_forecast
        env:
          GITHUB_TOKEN: ${{ github.token }}   # voor de GitHub Models-call
      - name: Commit forecast if changed
        run: |
          if ! git diff --quiet -- web/data/forecast.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add web/data/forecast.json
            git commit -m "chore: update forecast.json [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          else
            echo "forecast.json ongewijzigd"
          fi
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - uses: actions/deploy-pages@v4
